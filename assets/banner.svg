<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stephen Sookra — Building trustworthy AI">
  <title>Stephen Sookra — Building trustworthy AI</title>

  <defs>
    <style>
      @keyframes nodePulse {
        0%, 100% { opacity: 0.25; }
        50%      { opacity: 0.95; }
      }
      @keyframes drift {
        0%   { transform: translateX(-40px); opacity: 0; }
        8%   { opacity: 0.85; }
        92%  { opacity: 0.6; }
        100% { transform: translateX(1540px); opacity: 0; }
      }
      @keyframes scan {
        0%, 100% { transform: translateY(0); opacity: 0; }
        40%      { opacity: 0.06; }
        100%     { transform: translateY(500px); opacity: 0; }
      }
      @keyframes titleBreath {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.008); }
      }
      .n1 { animation: nodePulse 3s  ease-in-out infinite; }
      .n2 { animation: nodePulse 4s  ease-in-out infinite; animation-delay: -1s; }
      .n3 { animation: nodePulse 5s  ease-in-out infinite; animation-delay: -2s; }
      .n4 { animation: nodePulse 6s  ease-in-out infinite; animation-delay: -3s; }
      .p1 { animation: drift 6s linear infinite;  }
      .p2 { animation: drift 7s linear infinite; animation-delay: -1.5s; }
      .p3 { animation: drift 8s linear infinite; animation-delay: -3.0s; }
      .p4 { animation: drift 9s linear infinite; animation-delay: -4.5s; }
      .p5 { animation: drift 10s linear infinite; animation-delay: -2.0s; }
      .p6 { animation: drift 11s linear infinite; animation-delay: -5.0s; }
      .scanline { animation: scan 9s ease-in-out infinite; }
      #title-group { animation: titleBreath 7s ease-in-out infinite; transform-origin: 750px 280px; }
    </style>

    <!-- Backgrounds + glows -->
    <linearGradient id="bgFlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E0F1C"/>
      <stop offset="0.5" stop-color="#1A0E2E">
        <animate attributeName="stop-color" values="#1A0E2E;#0E1A2E;#2E0E2E;#1A0E2E" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#0E0F1C"/>
    </linearGradient>

    <radialGradient id="glowCyan" cx="0.12" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#00C9FF" stop-opacity="0.45">
        <animate attributeName="stop-opacity" values="0.35;0.6;0.35" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#00C9FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowMagenta" cx="0.88" cy="0.85" r="0.58">
      <stop offset="0" stop-color="#9D50FF" stop-opacity="0.4">
        <animate attributeName="stop-opacity" values="0.3;0.55;0.3" dur="7s" repeatCount="indefinite" begin="2s"/>
      </stop>
      <stop offset="1" stop-color="#9D50FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Hero halo (soft glow behind serif title) -->
    <filter id="halo" x="-15%" y="-50%" width="130%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feFlood flood-color="#5BE0FF" flood-opacity="0.55"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Accent gradient for "trustworthy AI" -->
    <linearGradient id="accentText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5BE0FF"/>
      <stop offset="0.5" stop-color="#9FC4FF">
        <animate attributeName="offset" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#BF91F3"/>
    </linearGradient>

    <!-- Accent line draw -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5BE0FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5BE0FF"/>
      <stop offset="1" stop-color="#9D50FF" stop-opacity="0"/>
    </linearGradient>

    <!-- Eyebrow / hero reveal clips (typewriter feel) -->
    <clipPath id="eyebrowClip">
      <rect x="-10" y="150" width="0" height="60">
        <animate attributeName="width" values="0;1520" dur="1.2s" begin="0.2s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="heroClip">
      <rect x="-10" y="240" width="0" height="120">
        <animate attributeName="width" values="0;1520" dur="2.0s" begin="0.9s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="footerClip">
      <rect x="-10" y="380" width="0" height="40">
        <animate attributeName="width" values="0;1520" dur="1.4s" begin="2.6s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Layer 1 — base + animated bg gradient -->
  <rect width="1500" height="500" fill="#0E0F1C"/>
  <rect width="1500" height="500" fill="url(#bgFlow)" opacity="0.55"/>

  <!-- Layer 2 — corner glows -->
  <rect width="1500" height="500" fill="url(#glowCyan)"/>
  <rect width="1500" height="500" fill="url(#glowMagenta)"/>

  <!-- Layer 3 — horizon stripe pulsing -->
  <rect y="335" width="1500" height="40" fill="#9D50FF" opacity="0.05">
    <animate attributeName="opacity" values="0.03;0.12;0.03" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 4 — neural network nodes -->
  <g>
    <circle class="n1" cx="60"   cy="70"  r="2.5" fill="#5BE0FF"/>
    <circle class="n2" cx="155"  cy="120" r="2"   fill="#7B61FF"/>
    <circle class="n3" cx="250"  cy="60"  r="3"   fill="#5BE0FF"/>
    <circle class="n1" cx="370"  cy="140" r="2"   fill="#9D50FF"/>
    <circle class="n4" cx="490"  cy="80"  r="2.5" fill="#5BE0FF"/>
    <circle class="n2" cx="610"  cy="50"  r="2"   fill="#7B61FF"/>
    <circle class="n3" cx="730"  cy="110" r="2"   fill="#5BE0FF"/>
    <circle class="n4" cx="860"  cy="60"  r="3"   fill="#9D50FF"/>
    <circle class="n1" cx="980"  cy="130" r="2"   fill="#5BE0FF"/>
    <circle class="n2" cx="1110" cy="70"  r="2.5" fill="#7B61FF"/>
    <circle class="n3" cx="1240" cy="120" r="2"   fill="#5BE0FF"/>
    <circle class="n4" cx="1360" cy="60"  r="3"   fill="#9D50FF"/>
    <circle class="n1" cx="1450" cy="130" r="2"   fill="#5BE0FF"/>

    <circle class="n2" cx="80"   cy="430" r="2.5" fill="#9D50FF"/>
    <circle class="n3" cx="200"  cy="450" r="2"   fill="#7B61FF"/>
    <circle class="n4" cx="320"  cy="460" r="3"   fill="#5BE0FF"/>
    <circle class="n1" cx="450"  cy="445" r="2"   fill="#9D50FF"/>
    <circle class="n2" cx="580"  cy="465" r="2"   fill="#5BE0FF"/>
    <circle class="n3" cx="710"  cy="455" r="2.5" fill="#7B61FF"/>
    <circle class="n4" cx="840"  cy="465" r="2"   fill="#9D50FF"/>
    <circle class="n1" cx="970"  cy="450" r="3"   fill="#5BE0FF"/>
    <circle class="n2" cx="1100" cy="460" r="2"   fill="#7B61FF"/>
    <circle class="n3" cx="1220" cy="445" r="2"   fill="#9D50FF"/>
    <circle class="n4" cx="1340" cy="465" r="2.5" fill="#5BE0FF"/>
    <circle class="n1" cx="1450" cy="445" r="3"   fill="#9D50FF"/>

    <circle class="n3" cx="30"   cy="240" r="2"   fill="#5BE0FF"/>
    <circle class="n4" cx="1470" cy="260" r="2"   fill="#9D50FF"/>
  </g>

  <!-- Layer 5 — constellation connections -->
  <g stroke="#7B61FF" stroke-width="0.5" opacity="0.18" fill="none">
    <line x1="60"   y1="70"  x2="155"  y2="120"/>
    <line x1="250"  y1="60"  x2="370"  y2="140"/>
    <line x1="490"  y1="80"  x2="610"  y2="50"/>
    <line x1="610"  y1="50"  x2="730"  y2="110"/>
    <line x1="860"  y1="60"  x2="980"  y2="130"/>
    <line x1="1110" y1="70"  x2="1240" y2="120"/>
    <line x1="1240" y1="120" x2="1360" y2="60"/>
    <line x1="80"   y1="430" x2="200"  y2="450"/>
    <line x1="320"  y1="460" x2="450"  y2="445"/>
    <line x1="580"  y1="465" x2="710"  y2="455"/>
    <line x1="840"  y1="465" x2="970"  y2="450"/>
    <line x1="1100" y1="460" x2="1220" y2="445"/>
    <line x1="1340" y1="465" x2="1450" y2="445"/>
  </g>

  <!-- Layer 6 — particle stream -->
  <g>
    <circle class="p1" cx="0" cy="65"  r="1.5" fill="#5BE0FF"/>
    <circle class="p2" cx="0" cy="130" r="1"   fill="#7B61FF"/>
    <circle class="p3" cx="0" cy="180" r="1.5" fill="#FFFFFF"/>
    <circle class="p4" cx="0" cy="380" r="1"   fill="#9D50FF"/>
    <circle class="p5" cx="0" cy="430" r="1.5" fill="#5BE0FF"/>
    <circle class="p6" cx="0" cy="470" r="1"   fill="#FFFFFF"/>
    <circle class="p2" cx="0" cy="95"  r="1"   fill="#9D50FF"/>
    <circle class="p4" cx="0" cy="155" r="1"   fill="#5BE0FF"/>
    <circle class="p1" cx="0" cy="405" r="1"   fill="#7B61FF"/>
    <circle class="p3" cx="0" cy="455" r="1.5" fill="#9D50FF"/>
  </g>

  <!-- Layer 7 — scanline -->
  <rect class="scanline" x="0" y="0" width="1500" height="2" fill="#5BE0FF"/>

  <!-- Layer 8 — Eyebrow ("Hi, I'm Stephen.") -->
  <g clip-path="url(#eyebrowClip)">
    <text x="750" y="195" text-anchor="middle"
          font-family="'Instrument Serif', 'Cormorant Garamond', 'Playfair Display', Georgia, 'Times New Roman', serif"
          font-style="italic" font-size="38" fill="#A9B1D6" letter-spacing="1">Hi, I&#8217;m Stephen.</text>
  </g>

  <!-- Layer 9 — HERO: Building trustworthy AI. -->
  <g id="title-group" clip-path="url(#heroClip)" filter="url(#halo)">
    <text x="750" y="310" text-anchor="middle"
          font-family="'Instrument Serif', 'Cormorant Garamond', 'Playfair Display', Georgia, 'Times New Roman', serif"
          font-style="italic" font-size="92" font-weight="400" letter-spacing="0">
      <tspan fill="#FFFFFF">Building </tspan><tspan fill="url(#accentText)">trustworthy AI</tspan><tspan fill="#FFFFFF">.</tspan>
    </text>
  </g>

  <!-- Layer 10 — accent line draw beneath hero -->
  <line x1="750" y1="345" x2="750" y2="345" stroke="url(#accentLine)" stroke-width="2.5" stroke-linecap="round" opacity="0">
    <animate attributeName="x1" values="750;490" dur="1.4s" begin="2.4s" fill="freeze"/>
    <animate attributeName="x2" values="750;1010" dur="1.4s" begin="2.4s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.85" dur="1.4s" begin="2.4s" fill="freeze"/>
  </line>

  <!-- Layer 11 — Footer credentials -->
  <g clip-path="url(#footerClip)">
    <text x="750" y="408" text-anchor="middle"
          font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="14" font-weight="500" fill="#BF91F3" letter-spacing="4.5">FOUNDER-TRACK  ·  CS @ KSU  ·  ATLANTA  ·  2026</text>
  </g>

  <!-- Layer 12 — Terminal-window dots (top-right) -->
  <g transform="translate(1430,30)">
    <circle r="5" fill="#FF5F56" opacity="0.7"/>
    <circle r="5" cx="16"  fill="#FFBD2E" opacity="0.7"/>
    <circle r="5" cx="32"  fill="#27C93F" opacity="0.7"/>
  </g>
</svg>

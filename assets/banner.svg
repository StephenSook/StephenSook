<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stephen Sookra — CS @ KSU · AI/ML · Builder · Atlanta">
  <title>Stephen Sookra — CS @ KSU · AI/ML · Builder · Atlanta</title>

  <defs>
    <style>
      @keyframes nodePulse {
        0%, 100% { opacity: 0.25; }
        50%      { opacity: 0.95; }
      }
      @keyframes drift {
        0%   { transform: translateX(-40px); opacity: 0; }
        8%   { opacity: 0.85; }
        92%  { opacity: 0.6; }
        100% { transform: translateX(1540px); opacity: 0; }
      }
      @keyframes scan {
        0%, 100% { transform: translateY(0); opacity: 0; }
        40%      { opacity: 0.06; }
        100%     { transform: translateY(500px); opacity: 0; }
      }
      @keyframes titleBreath {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.012); }
      }
      .n1 { animation: nodePulse 3s  ease-in-out infinite; }
      .n2 { animation: nodePulse 4s  ease-in-out infinite; animation-delay: -1s; }
      .n3 { animation: nodePulse 5s  ease-in-out infinite; animation-delay: -2s; }
      .n4 { animation: nodePulse 6s  ease-in-out infinite; animation-delay: -3s; }
      .p1 { animation: drift 6s linear infinite;  }
      .p2 { animation: drift 7s linear infinite; animation-delay: -1.5s; }
      .p3 { animation: drift 8s linear infinite; animation-delay: -3.0s; }
      .p4 { animation: drift 9s linear infinite; animation-delay: -4.5s; }
      .p5 { animation: drift 10s linear infinite; animation-delay: -2.0s; }
      .p6 { animation: drift 11s linear infinite; animation-delay: -5.0s; }
      .scanline { animation: scan 9s ease-in-out infinite; }
      #title-group { animation: titleBreath 5s ease-in-out infinite; transform-origin: 750px 230px; }
    </style>

    <!-- Backgrounds + glows -->
    <linearGradient id="bgFlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E0F1C"/>
      <stop offset="0.5" stop-color="#1A0E2E">
        <animate attributeName="stop-color" values="#1A0E2E;#0E1A2E;#2E0E2E;#1A0E2E" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#0E0F1C"/>
    </linearGradient>

    <radialGradient id="glowCyan" cx="0.12" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#00C9FF" stop-opacity="0.45">
        <animate attributeName="stop-opacity" values="0.35;0.6;0.35" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#00C9FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowMagenta" cx="0.88" cy="0.85" r="0.58">
      <stop offset="0" stop-color="#9D50FF" stop-opacity="0.4">
        <animate attributeName="stop-opacity" values="0.3;0.55;0.3" dur="7s" repeatCount="indefinite" begin="2s"/>
      </stop>
      <stop offset="1" stop-color="#9D50FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Title halo -->
    <filter id="halo" x="-25%" y="-50%" width="150%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feFlood flood-color="#5BE0FF" flood-opacity="0.85"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtitle gradient (cyan→white→violet→magenta) with traveling highlight -->
    <linearGradient id="subWipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5BE0FF"/>
      <stop offset="0.4" stop-color="#FFFFFF">
        <animate attributeName="offset" values="-0.3;1.3;-0.3" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.6" stop-color="#9D50FF">
        <animate attributeName="offset" values="-0.1;1.5;-0.1" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#5BE0FF"/>
    </linearGradient>

    <!-- Subtitle typewriter clip -->
    <clipPath id="subClip">
      <rect x="-10" y="280" width="0" height="80">
        <animate attributeName="width" values="0;1520" dur="2.6s" begin="0.4s" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Accent line draw -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5BE0FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5BE0FF"/>
      <stop offset="1" stop-color="#9D50FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Layer 1 — base + animated bg gradient -->
  <rect width="1500" height="500" fill="#0E0F1C"/>
  <rect width="1500" height="500" fill="url(#bgFlow)" opacity="0.55"/>

  <!-- Layer 2 — corner glows (cyan upper-left, magenta lower-right) -->
  <rect width="1500" height="500" fill="url(#glowCyan)"/>
  <rect width="1500" height="500" fill="url(#glowMagenta)"/>

  <!-- Layer 3 — horizon stripe pulsing -->
  <rect y="320" width="1500" height="55" fill="#9D50FF" opacity="0.07">
    <animate attributeName="opacity" values="0.05;0.16;0.05" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 4 — neural network nodes (constellation, pulsing) -->
  <g>
    <!-- top arc -->
    <circle class="n1" cx="60"   cy="70"  r="2.5" fill="#5BE0FF"/>
    <circle class="n2" cx="155"  cy="120" r="2"   fill="#7B61FF"/>
    <circle class="n3" cx="250"  cy="60"  r="3"   fill="#5BE0FF"/>
    <circle class="n1" cx="370"  cy="140" r="2"   fill="#9D50FF"/>
    <circle class="n4" cx="490"  cy="80"  r="2.5" fill="#5BE0FF"/>
    <circle class="n2" cx="610"  cy="50"  r="2"   fill="#7B61FF"/>
    <circle class="n3" cx="730"  cy="110" r="2"   fill="#5BE0FF"/>
    <circle class="n4" cx="860"  cy="60"  r="3"   fill="#9D50FF"/>
    <circle class="n1" cx="980"  cy="130" r="2"   fill="#5BE0FF"/>
    <circle class="n2" cx="1110" cy="70"  r="2.5" fill="#7B61FF"/>
    <circle class="n3" cx="1240" cy="120" r="2"   fill="#5BE0FF"/>
    <circle class="n4" cx="1360" cy="60"  r="3"   fill="#9D50FF"/>
    <circle class="n1" cx="1450" cy="130" r="2"   fill="#5BE0FF"/>

    <!-- bottom arc -->
    <circle class="n2" cx="80"   cy="420" r="2.5" fill="#9D50FF"/>
    <circle class="n3" cx="200"  cy="380" r="2"   fill="#7B61FF"/>
    <circle class="n4" cx="320"  cy="450" r="3"   fill="#5BE0FF"/>
    <circle class="n1" cx="450"  cy="400" r="2"   fill="#9D50FF"/>
    <circle class="n2" cx="580"  cy="440" r="2"   fill="#5BE0FF"/>
    <circle class="n3" cx="710"  cy="395" r="2.5" fill="#7B61FF"/>
    <circle class="n4" cx="840"  cy="450" r="2"   fill="#9D50FF"/>
    <circle class="n1" cx="970"  cy="395" r="3"   fill="#5BE0FF"/>
    <circle class="n2" cx="1100" cy="440" r="2"   fill="#7B61FF"/>
    <circle class="n3" cx="1220" cy="385" r="2"   fill="#9D50FF"/>
    <circle class="n4" cx="1340" cy="445" r="2.5" fill="#5BE0FF"/>
    <circle class="n1" cx="1450" cy="395" r="3"   fill="#9D50FF"/>

    <!-- side accents -->
    <circle class="n3" cx="30"   cy="240" r="2"   fill="#5BE0FF"/>
    <circle class="n4" cx="1470" cy="260" r="2"   fill="#9D50FF"/>
  </g>

  <!-- Layer 5 — faint constellation connection lines -->
  <g stroke="#7B61FF" stroke-width="0.5" opacity="0.18" fill="none">
    <line x1="60"   y1="70"  x2="155"  y2="120"/>
    <line x1="250"  y1="60"  x2="370"  y2="140"/>
    <line x1="490"  y1="80"  x2="610"  y2="50"/>
    <line x1="610"  y1="50"  x2="730"  y2="110"/>
    <line x1="860"  y1="60"  x2="980"  y2="130"/>
    <line x1="1110" y1="70"  x2="1240" y2="120"/>
    <line x1="1240" y1="120" x2="1360" y2="60"/>
    <line x1="80"   y1="420" x2="200"  y2="380"/>
    <line x1="320"  y1="450" x2="450"  y2="400"/>
    <line x1="580"  y1="440" x2="710"  y2="395"/>
    <line x1="840"  y1="450" x2="970"  y2="395"/>
    <line x1="1100" y1="440" x2="1220" y2="385"/>
    <line x1="1340" y1="445" x2="1450" y2="395"/>
  </g>

  <!-- Layer 6 — particle stream (drifting horizontally) -->
  <g>
    <circle class="p1" cx="0" cy="65"  r="1.5" fill="#5BE0FF"/>
    <circle class="p2" cx="0" cy="130" r="1"   fill="#7B61FF"/>
    <circle class="p3" cx="0" cy="180" r="1.5" fill="#FFFFFF"/>
    <circle class="p4" cx="0" cy="370" r="1"   fill="#9D50FF"/>
    <circle class="p5" cx="0" cy="420" r="1.5" fill="#5BE0FF"/>
    <circle class="p6" cx="0" cy="470" r="1"   fill="#FFFFFF"/>
    <circle class="p2" cx="0" cy="95"  r="1"   fill="#9D50FF"/>
    <circle class="p4" cx="0" cy="155" r="1"   fill="#5BE0FF"/>
    <circle class="p1" cx="0" cy="395" r="1"   fill="#7B61FF"/>
    <circle class="p3" cx="0" cy="445" r="1.5" fill="#9D50FF"/>
  </g>

  <!-- Layer 7 — slow scan line for cyber feel -->
  <rect class="scanline" x="0" y="0" width="1500" height="2" fill="#5BE0FF"/>

  <!-- Layer 8 — TITLE: STEPHEN SOOKRA (with glow halo + breathing) -->
  <g id="title-group" filter="url(#halo)">
    <text x="750" y="245" text-anchor="middle"
          font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-weight="900" font-size="105" fill="#FFFFFF" letter-spacing="3">STEPHEN SOOKRA</text>
  </g>

  <!-- Layer 9 — SUBTITLE typewriter + traveling-highlight gradient -->
  <g clip-path="url(#subClip)">
    <text x="750" y="320" text-anchor="middle"
          font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="26" fill="url(#subWipe)" letter-spacing="6" font-weight="600">CS @ KSU  ·  AI/ML  ·  BUILDER  ·  ATLANTA</text>
  </g>

  <!-- Layer 10 — accent line drawing in beneath subtitle -->
  <line x1="750" y1="350" x2="750" y2="350" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0">
    <animate attributeName="x1" values="750;430" dur="1.4s" begin="2.4s" fill="freeze"/>
    <animate attributeName="x2" values="750;1070" dur="1.4s" begin="2.4s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.85" dur="1.4s" begin="2.4s" fill="freeze"/>
  </line>

  <!-- Layer 11 — three small status dots top-right (terminal-window vibe) -->
  <g transform="translate(1430,30)">
    <circle r="5" fill="#FF5F56" opacity="0.7"/>
    <circle r="5" cx="16"  fill="#FFBD2E" opacity="0.7"/>
    <circle r="5" cx="32"  fill="#27C93F" opacity="0.7"/>
  </g>
</svg>

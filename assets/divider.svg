<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 16" width="1200" height="16" preserveAspectRatio="none" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="flow" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="400" y2="0" spreadMethod="repeat">
      <stop offset="0" stop-color="#00C9FF"/>
      <stop offset="0.33" stop-color="#7B61FF"/>
      <stop offset="0.66" stop-color="#9D50FF"/>
      <stop offset="1" stop-color="#00C9FF"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0,0" to="400,0" dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="comet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#aef6ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#d9faff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#aef6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.10" stop-color="#fff" stop-opacity="1"/>
      <stop offset="0.90" stop-color="#fff" stop-opacity="1"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="edgefade"><rect width="1200" height="16" fill="url(#fade)"/></mask>
    <filter id="soft" x="-2%" y="-400%" width="104%" height="900%"><feGaussianBlur stdDeviation="2.4"/></filter>
  </defs>
  <g mask="url(#edgefade)">
    <rect x="0" y="6.4" width="1200" height="3.2" rx="1.6" fill="url(#flow)" opacity="0.5" filter="url(#soft)"/>
    <rect x="0" y="7" width="1200" height="2" rx="1" fill="url(#flow)"/>
    <rect x="-200" y="6.3" width="200" height="3.4" rx="1.7" fill="url(#comet)">
      <animate attributeName="x" values="-200;1200" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
